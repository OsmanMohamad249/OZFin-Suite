<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditPulse - Comprehensive Audit ERP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <!-- xlsx.full.min.js for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a'
                        },
                        accent: {
                            500: '#10b981',
                            600: '#059669'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans antialiased">
    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary-600 mb-4 mx-auto"></div>
            <p class="text-gray-600">Loading AuditPulse...</p>
        </div>
    </div>
    
    <!-- Main Application Container -->
    <div id="app" class="hidden min-h-screen bg-gray-50">
        <!-- Content will be dynamically loaded here -->
    </div>
    
    <!-- Language Toggle -->
    <div id="language-toggle" class="fixed top-4 right-4 z-40 hidden">
        <button id="lang-btn" class="flex items-center space-x-2 bg-white px-4 py-2 rounded-lg shadow-lg hover:shadow-xl transition-all">
            <span id="current-lang">EN</span>
            <i data-lucide="globe" class="w-4 h-4"></i>
        </button>
    </div>
    
    <!-- Notification Container -->
    <div id="notifications" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 space-y-2">
        <!-- Dynamic notifications will appear here -->
    </div>
    
    <!-- Main JavaScript -->
    <script src="script.js"></script>
</body>
</html>
